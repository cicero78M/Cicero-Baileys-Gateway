services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cicero_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cicero}
      POSTGRES_PASSWORD: ${DB_PASS:-cicero_secret}
      POSTGRES_DB: ${DB_NAME:-cicero_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optionally mount schema to auto-init on first run:
      # - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cicero} -d ${DB_NAME:-cicero_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cicero_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cicero_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      # Database
      DB_USER: ${DB_USER:-cicero}
      DB_PASS: ${DB_PASS:-cicero_secret}
      DB_NAME: ${DB_NAME:-cicero_db}
      DB_HOST: postgres
      DB_PORT: 5432
      # Redis – use container name as host
      REDIS_URL: redis://redis:6379
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY:-}
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # WhatsApp
      ADMIN_WHATSAPP: ${ADMIN_WHATSAPP:-}
      GATEWAY_WHATSAPP_ADMIN: ${GATEWAY_WHATSAPP_ADMIN:-}
      USER_WA_CLIENT_ID: ${USER_WA_CLIENT_ID:-wa-userrequest}
      GATEWAY_WA_CLIENT_ID: ${GATEWAY_WA_CLIENT_ID:-wa-gateway}
      APP_SESSION_NAME: ${APP_SESSION_NAME:-}
      WA_SERVICE_SKIP_INIT: ${WA_SERVICE_SKIP_INIT:-false}
      # RapidAPI
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      RAPIDAPI_FALLBACK_KEY: ${RAPIDAPI_FALLBACK_KEY:-}
      RAPIDAPI_FALLBACK_HOST: ${RAPIDAPI_FALLBACK_HOST:-}
      # Neon sync
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_BACKUP_URL: ${DATABASE_BACKUP_URL:-}
      ENABLE_NEON_SYNC_CRON: ${ENABLE_NEON_SYNC_CRON:-true}
      # Feature flags
      ENABLE_DIRREQUEST_GROUP: ${ENABLE_DIRREQUEST_GROUP:-true}
      ALLOW_DUPLICATE_REQUESTS: ${ALLOW_DUPLICATE_REQUESTS:-false}
    volumes:
      # Persist WhatsApp session credentials
      - wa_session:/app/auth_info_baileys
      - uploads:/app/uploads
      - backups:/app/backups
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
  wa_session:
  uploads:
  backups:
